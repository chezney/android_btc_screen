plugins {
    id 'com.android.application'
}

android {
    namespace 'com.chezney.btcscreen'
    compileSdk 34

    defaultConfig {
        applicationId "com.chezney.btcscreen"
        minSdk 26
        targetSdk 34
        versionCode 5
        versionName "1.4"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
